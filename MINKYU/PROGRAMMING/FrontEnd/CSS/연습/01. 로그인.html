<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>로그인</title>
    <!-- style tag -->
    <style>
      * {
        margin: 0;
        padding: 0;
        /* box-sizing 설정 */
        box-sizing: border-box;
      }
      /* 전체 영역 */
      body {
        margin: 0;
        background-color: #f5f6fa;
        display: flex;
        justify-content: center;
        padding: 40px 20px;
      }

      main {
        width: 100%;
        max-width: 400px;
        background-color: white;
        padding: 30px 26px;
        border-radius: 10px;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.8);
      }

      h1 {
        text-align: center;
        margin-bottom: 24px;
        font-size: 24px;
      }

      /* 입력 필드 영역 */
      .field {
        margin-bottom: 18px;
      }

      .field label {
        /* 기존 inline인 label을 block으로 */
        display: block;
        font-size: 14px;
        margin-bottom: 6px;
        color: #333;
      }

      .field input {
        width: 100%;
        padding: 12px 14px;
        font-size: 14px;
        margin-top: 6px;
        margin-bottom: 6px;
        color: #333;
      }

      /* 로그인 유지 / 비밀번호 찾기 */
      .actions {
        /* 주어진 div 내부 요소 배치를 flex로 변경 */
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
        font-size: 14px;
      }

      .actions a {
        color: #5b6b94;
        /* 밑줄 없애기 */
        text-decoration: none;
      }

      /* 로그인 버튼 */
      .loginBox .btn {
        width: 100%;
        padding: 12px 14px;
        background-color: #2d6cff;
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
      }
      /* 회원가입 버튼 */
      .joinBox {
        text-align: center;
        color: #666;
      }

      .joinBox a {
        color: #2d6cff;
        text-decoration: none;
        font-weight: 500;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>로그인</h1>
      <!-- login form -->
      <form action="" id="loginForm">
        <!-- 1. id Field -->
        <div class="field">
          <label for="username">아이디</label>
          <input
            type="text"
            id="username"
            name="username"
            placeholder="아이디를 입력해 주세요."
            required
          />
        </div>

        <!-- 2. password Field -->
        <div class="field">
          <label for="password">비밀번호</label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="비밀번호를 입력해 주세요."
            required
          />
        </div>

        <!-- 3. 로그인 유지 기능 / 비밀번호 찾기 기능 -->
        <div class="actions">
          <label for="rememberId">
            <input type="checkbox" name="rememberId" id="rememberId" />
            로그인 유지
          </label>
          <a href="" id="forgotPassword">비밀번호 찾기</a>
        </div>

        <!-- 4. 로그인 버튼 -->
        <div class="loginBox">
          <button class="btn" type="submit">로그인</button>
        </div>

        <!-- 5. 회원가입 버튼 -->
        <div class="joinBox">
          <p class="small">아직 계정이 없으신가요?<a href="">회원가입</a></p>
        </div>
      </form>
    </main>
  </body>
</html>
