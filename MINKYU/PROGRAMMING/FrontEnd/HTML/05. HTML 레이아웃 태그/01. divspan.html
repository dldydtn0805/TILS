<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>공간 분할 태그</h1>
    <!-- 
    div(divide) : 공간을 나누는 태그
    - 페이지를 논리적인 영역으로 분리하기 위해 사용
    - block 요소(상위 영역의 전체 너비를 차지) 
  -->
    <h2>div 요소</h2>
    <div style="border: 2px solid blue">
      <h3>HTML</h3>
      <p>HyperText Markup Language</p>
    </div>

    <hr />
    <!-- 
    span(spanning) : 요소의 내용이 필요한 크기만 차지하는 태그
    - 디자인적으로 구분이 필요한 요소를 지정할 때 사용
    - inline 요소(다른 요소와 한 줄에 나란히 배치)
    -->
    <h2>span 요소</h2>
    <div style="border: 2px solid red">
      <h3>CSS</h3>
      <p>
        Cascading
        <span style="color: red; background-color: yellow">Style</span>
        Sheet
      </p>
    </div>
  </body>
</html>
