<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>div 레이아웃</title>
    <style>
      /* 전체  */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      /* 헤더 영역 */
      .header {
        background-color: #f1f1f1;
        padding: 36px;
        text-align: center;
        font-size: 24px;
      }
      /* 메인 좌측 영역 */
      .left-side {
        float: left;
        background-color: #aaa;
        width: 25%;
        padding: 10px;
        height: 300px;
      }
      /* 메인 중앙 영역 */
      .main {
        float: left;
        background-color: #bbb;
        width: 50%;
        padding: 10px;
        height: 300px;
      }
      /* 메인 우측 영역 */
      .right-side {
        float: left;
        background-color: #ccc;
        width: 25%;
        padding: 10px;
        height: 300px;
      }
      /* 하단(푸터) 영역 */
      .footer {
        background-color: black;
        padding: 10px;
        text-align: center;
        color: white;
        line-height: 100px;
      }
    </style>
  </head>
  <body>
    <h1>div 레이아웃</h1>
    <!-- 1. 헤더 영역 -->
    <div class="header">
      <h2>헤더 영역</h2>
    </div>
    <!-- 2. 콘테이너 영억 -->
    <div class="container">
      <div class="left-side">왼쪽</div>
      <div class="main">중앙</div>
      <div class="right-side">오른쪽</div>
    </div>
    <!-- 3. 푸터 영역 -->
    <div class="footer">
      <p>푸터 영역</p>
    </div>
  </body>
</html>
