<!-- ! + Enter : HTML 기본 코드 작성 -->
<!-- 주석 : Ctrl + / -->
<!-- 중간 주석 : alt + shift + a -->
<!-- HTML5 문서임을 정의 -->
<!DOCTYPE html>
<!-- HTML 문서의 시작 -->
<html lang="en">
  <!-- 브라우저 정보 제공 태그 (메타 정보, 페이지 제목, 외부 파일 등) -->
  <head>
    <!-- 문서 인코딩 방식 지정 -->
    <meta charset="UTF-8" />
    <!-- Viewport(페이지의 크기, 비율 제어 방법) 지정 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- 브라우저 탭 제목 -->
    <title>Document</title>
  </head>

  <!-- 본문(화면에 표시되는 영역) 내용 -->
  <body></body>
</html>
