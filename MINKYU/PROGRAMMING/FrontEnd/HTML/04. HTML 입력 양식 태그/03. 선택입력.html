<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>선택 입력</title>
  </head>
  <body>
    <h1>선택 입력</h1>
    <h2>라디오 / 체크박스 / 드롭다운</h2>

    <!-- 1. radio -->
    <h3>radio - 성별</h3>
    <!-- name이 gender인 두 input이 존재 -->
    <!-- 같은 name 값을 가진 input에 대해 중복 선택 불가 -->
    <!-- form 제출 시, 선택한 input의 값을 name에 저장된 이름(gender)에 해당하는 값으로 전달됨 -->
    <label for="female">여자</label>
    <input type="radio" name="gender" id="female" value="female" />
    <label for="male">남자</label>
    <input type="radio" name="gender" id="male" value="male" />
    <hr />
    <!-- 2. checkbox  -->
    <!-- 같은 name을 가진 input에 대해 중복 선택 가능 -->
    <h3>checkbox - 취미</h3>
    <label for="exercise">운동</label>
    <input type="checkbox" name="hobby" id="exercise" value="exercise" />
    <label for="music">음악 감상</label>
    <input type="checkbox" name="hobby" id="music" value="music" />
    <label for="movie">영화 시청</label>
    <input type="checkbox" name="hobby" id="movie" value="movie" />
    <hr />

    <!-- 3. dropdown -->
    <!-- select[id] > option[value] 형태로 구성 -->
    <h3>dropdown</h3>
    <label for="email">이메일</label>
    <input type="text" name="emailId" id="email" />
    @
    <select name="domain" id="domain">
      <option value="1">naver.com</option>
      <option value="2">gmail.com</option>
      <option value="3">kakao.com</option>
    </select>
  </body>
</html>
