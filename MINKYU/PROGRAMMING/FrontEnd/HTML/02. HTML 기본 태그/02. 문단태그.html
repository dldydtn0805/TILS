<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>문단 태그</title>
  </head>
  <body>
    <!-- 
    <p></p> : 문단 사이의 기본 여백을 가지는 태그
    <br> : 개행(엔터 키 역할)을 시행해 주는 태그
    <pre></pre> : 입력한 그대로(공백, 줄바꿈을 다 포함한 상태) 출력해 주는 태그
  -->
    <p>하나의 문단 입니다.</p>
    <p>하나의 문단 입니다.</p>

    <p>
      첫 번째 줄입니다. <br />
      두 번째 줄입니다. <br />
    </p>
    <pre>
    입  력한 그대로    나오게 해주는

    신 기한 태
    그.!
  </pre
    >
  </body>
</html>
