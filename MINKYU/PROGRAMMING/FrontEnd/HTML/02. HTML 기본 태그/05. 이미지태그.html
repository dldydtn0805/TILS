<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>이미지 태그</title>
  </head>
  <body>
    <!-- 
      <img>
      - src               : 이미지 파일 경로
      - width / height    : 가로 / 세로 사이즈 지정
      - alt               : 대체 텍스트 지정
      - border            : 테두리 굵기 지정(px)
    -->
    <h1>이미지 태그</h1>
    <div>
      <h2>셔츠</h2>
      <img
        src="./img/셔츠.jpg"
        alt="셔츠 이미지"
        width="100"
        height="100"
        title="셔츠"
      />
    </div>
    <div>
      <h2>바지</h2>
      <img
        src="./img/바지.jpg"
        alt="바지 이미지"
        width="100"
        height="100"
        title="바지"
      />
    </div>
    <div>
      <h2>신발</h2>
      <img
        src="./img/신발.jpg"
        alt="신발 이미지"
        width="100"
        height="100"
        title="신발"
      />
    </div>
    <!-- 절대경로(이미지 주소)로 이미지 가져오기 -->
    <div>
      <h2>내가 좋아하는 포켓몬 이미지</h2>
      <img
        src="https://pokemonkorea.co.kr/img/sub/img_compay_info.png"
        alt="절대 경로를 통해 가져온 포켓몬 이미지"
        width="100"
        height="100"
      />
    </div>
    <div>
      <h2>절대 경로로 가져온 신발</h2>
      <img
        src="
        C:\GitHub\TILS\MINKYU\PROGRAMMING\FrontEnd\HTML\02. HTML 기본 태그\img\바지.jpg
        ./img/신발.jpg"
        alt="신발 이미지"
        width="100"
        height="100"
        title="신발"
      />
    </div>
    <!-- 이미지가 없을 경우(alt 활용) -->
    <div>
      <h2>없는 이미지일 경우</h2>
      <img src="./img/없는이미지.jpg" alt="이미지가 없습니다." />
    </div>
  </body>
</html>
