<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>리스트 태그</title>
  </head>
  <body>
    <!-- 
    <ul></ul>        : 번호 없는 리스트 태그
    <ol></ol>        : 번호 있는 리스트 태그
    <dl>             : 정의 리스트 태그
    -->
    <h3>ul(unordered list) : 번호 없는 리스트 태그</h3>
    <!-- ul>(li*3) -->
    <ul>
      <li>카페 라떼 : 3500원</li>
      <li>아이스 아메리카노 : 2000원</li>
      <li>딸기 프라푸치노 : 4500원</li>
    </ul>

    <h3>ol(ordered list) : 번호 있는 리스트 태그</h3>
    <!-- ol>(li*3) -->
    <ol>
      <li>HTML</li>
      <li>CSS</li>
      <li>JavaScript</li>
    </ol>
    <!-- 속성 : start, type(1, a, A, i, I), reversed -->
    <!-- 기본 속성 : start="1", type="1", reversed="false"-->
    <ol start="1" type="a">
      <li>HTML</li>
      <li>CSS</li>
      <li>JavaScript</li>
    </ol>

    <h3>dl(definition list) : 정의 리스트 태그</h3>
    <!-- dl 태그 내부에서 dt - dd 태그가 한 세트로 이루어짐 -->
    <!-- dt : 정의 리스트 제목(title) 태그 -->
    <!-- dd : 정의 리스트 설명(description) 태그 -->
    <!-- dl>(dt+dd)*2 -->
    <dl>
      <dt>HTML</dt>
      <dd>- 마크업 언어</dd>
      <dt>CSS</dt>
      <dd>- 스타일 시트</dd>
    </dl>
  </body>
</html>
