<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>테이블 태그</title>
  </head>
  <body>
    <!-- 테이블 태그 실습 -->
    <h1>카페 메뉴판</h1>
    <table border="1">
      <!-- 1. tr - th 세트 작성 -->
      <!-- tr(table row) : 행 작성 -->
      <tr>
        <!-- th(table column) : 열 작성 -->
        <th width="200">메뉴</th>
        <th width="100">가격</th>
        <th width="100">종류</th>
      </tr>
      <!-- 2. tr - td 세트 작성 -->
      <tr>
        <!-- td(table data) : tc에 해당하는 데이터 작성 -->
        <td align="center">아메리카노</td>
        <td align="center">2,000</td>
        <td align="center">hot / ice</td>
      </tr>
      <tr>
        <td align="center">카페라떼</td>
        <td align="center">3,000</td>
        <td align="center">hot / ice</td>
      </tr>
      <tr>
        <td align="center">아이스티</td>
        <td align="center">1,500</td>
        <td align="center">ice</td>
      </tr>
    </table>

    <table border="1">
      <thead>
        <tr>
          <th width="100">월</th>
          <th width="200">수입</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td align="center">10월</td>
          <td align="center">1,000,000</td>
        </tr>
        <tr>
          <td align="center">11월</td>
          <td align="center">1,500,000</td>
        </tr>
        <tr>
          <td align="center">12월</td>
          <td align="center">2,000,000</td>
        </tr>
      </tbody>
      <tfoot>
        <tr>
          <td align="center">합계</td>
          <td align="center">4,500,000</td>
        </tr>
      </tfoot>
    </table>

    <h1>3월 달력</h1>
    <table>
      <!-- 열 별 그룹화 -->
      <colgroup>
        <col style="background-color: red" />
        <!-- 
        <col style="background-color: white" />
        <col style="background-color: white" />
        <col style="background-color: white" />
        <col style="background-color: white" />
        <col style="background-color: white" />
        -->
        <col span="5" style="background-color: white" />
        <col style="background-color: blue" />
      </colgroup>
      <tr>
        <td>일</td>
        <td>월</td>
        <td>화</td>
        <td>수</td>
        <td>목</td>
        <td>금</td>
        <td>토</td>
      </tr>
      <tr>
        <td>1</td>
        <td>2</td>
        <td>3</td>
        <td>4</td>
        <td>5</td>
        <td>6</td>
        <td>7</td>
      </tr>
      <tr>
        <td>8</td>
        <td>9</td>
        <td>10</td>
        <td>11</td>
        <td>12</td>
        <td>13</td>
        <td>14</td>
      </tr>
      <tr>
        <td>15</td>
        <td>16</td>
        <td>17</td>
        <td>18</td>
        <td>19</td>
        <td>20</td>
        <td>21</td>
      </tr>
      <tr>
        <td>22</td>
        <td>23</td>
        <td>24</td>
        <td>25</td>
        <td>26</td>
        <td>27</td>
        <td>28</td>
      </tr>
      <tr>
        <td>29</td>
        <td>30</td>
        <td>31</td>
        <td></td>
        <td></td>
        <td></td>
        <td></td>
      </tr>
    </table>
  </body>
</html>
